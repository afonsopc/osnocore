[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[program:dockerd]
command=dockerd --host=unix:///var/run/docker.sock
autostart=false
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:redis]
command=redis-server --bind 127.0.0.1 --port 6379 --save 60 1 --loglevel warning
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nextjs]
command=bun run start
directory=/app
user=api
autorestart=true
priority=20
environment=NODE_ENV="production",IS_DOCKER="true",REDIS_HOST="127.0.0.1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ws-server]
command=node --import tsx src/server/ws-server.ts
directory=/app
user=api
autorestart=true
priority=20
environment=IS_DOCKER="true",REDIS_HOST="127.0.0.1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
