services:
  mestreos:
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./home:/home/user
    profiles: [prod]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

  mestreos-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: [dev]
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - .:/app
      - ./dev_node_modules:/app/node_modules
      - ./home:/home/user
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
